<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Search with me — Settings</title>
  <style>
    :root {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --input-bg: #2d2d2d;
      --border-color: #3d3d3d;
      --accent-blue: #0078d4;
      --accent-green: #28a745;
      --accent-red: #dc3545;
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      margin: 0;
      width: 450px; /* Width for floating popup */
      box-sizing: border-box;
    }

    h1 {
      font-size: 1.2rem;
      margin-top: 0;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    p { font-size: 0.9rem; opacity: 0.8; }
    code { background: var(--input-bg); padding: 2px 4px; border-radius: 3px; }

    #status {
      margin: 10px 0 12px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    #status[data-variant="success"] {
      background: rgba(40, 167, 69, 0.14);
      border: 1px solid rgba(40, 167, 69, 0.35);
    }

    #status[data-variant="error"] {
      background: rgba(220, 53, 69, 0.14);
      border: 1px solid rgba(220, 53, 69, 0.35);
    }

    .engine-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .engine-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 140px;
      min-width: 0;
    }

    .engine-row.dragging {
      opacity: 0.55;
    }

    .engine-row.drop-target {
      outline: 1px solid var(--accent-blue);
      outline-offset: 2px;
    }

    input {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px;
      border-radius: 4px;
      outline: none;
    }

    input:focus { border-color: var(--accent-blue); }

    input.input-error {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 1px rgba(220, 53, 69, 0.35);
    }

    .drag-handle {
      width: 42px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 0;
      background: #52525b;
      color: white;
      cursor: grab;
      user-select: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .drag-handle-line {
      width: 4px;
      height: 14px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.9;
    }

    .engine-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      overflow: hidden;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #2f343f;
      color: #f8fafc;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .engine-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .engine-icon-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .name-input { width: 100px; }
    .url-input { flex: 1; min-width: 0; }

    button {
      padding: 6px 12px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }

    .remove-btn {
      background: var(--accent-red);
      color: white;
      width: 42px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .trash-icon {
      position: relative;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top: none;
      border-radius: 0 0 2px 2px;
      box-sizing: border-box;
    }

    .trash-icon::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -5px;
      width: 10px;
      height: 2px;
      background: currentColor;
      transform: translateX(-50%);
      border-radius: 999px;
    }

    .trash-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 6px;
      height: 2px;
      background: currentColor;
      transform: translateX(-50%);
      border-radius: 999px;
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid var(--border-color);
    }

    #add-btn { background: var(--accent-blue); color: white; }
    #save-btn { background: var(--accent-green); color: white; }
    #export-btn { background: #4b5563; color: white; }
    #import-btn { background: #6b7280; color: white; }

    #import-file {
      display: none;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <h1>Search with me</h1>
  <p>Use <code>%s</code> for selection text. If you omit it, the selection is added as <code>?q=</code>.</p>
  <div id="status" hidden></div>
  
  <div id="engines-container"></div>
  
  <div class="footer">
    <button id="add-btn">+ Add</button>
    <button id="import-btn" type="button">Import JSON</button>
    <button id="export-btn" type="button">Export JSON</button>
    <button id="save-btn">Save</button>
  </div>

  <input id="import-file" type="file" accept="application/json,.json">

  <script src="engines.js"></script>
  <script src="options.js"></script>
</body>
</html>
